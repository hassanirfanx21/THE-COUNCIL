services:
  postgres:
    image: pgvector/pgvector:pg16 # postgres + vector extension built in
    container_name: council_db
    environment:
      POSTGRES_USER: langchain
      POSTGRES_PASSWORD: langchain
      POSTGRES_DB: langgraph_mem
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # data lives in your project folder
    restart: unless-stopped
